; ============================================================
; Tarshid (ترشيد) Smart Library — ESP32 PlatformIO Config
; ============================================================
; Board:    ESP32 Dev Module
; Framework: Arduino
; Libraries: auto-fetched by PlatformIO on first build
; ============================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    links2004/WebSockets @ ^2.4.1
    miguelbalboa/MFRC522 @ ^1.4.11
